name: Build Android Kotlin APK with Icon
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Android Project
        run: |
          # دروستکرنا فۆڵدەران ب شێوازەکێ گشتی و سادە
          mkdir -p app/src/main/java/com/devkurdi/black
          mkdir -p app/src/main/res/drawable

          # کۆپیکردنا کۆدێ کاتلین ئەگەر هەبیت
          if [ -f "MainActivity.kt" ]; then
            cp MainActivity.kt app/src/main/java/com/devkurdi/black/
          fi

          # گواستنەوەیا وێنەیێ ئایکۆنی ژ لاپەڕەیا سەرەکی
          if [ -f "ic_launcher.png" ]; then
            cp ic_launcher.png app/src/main/res/drawable/
          fi

          # دروستکردنی فایلی مانیفێست یێ سادەکری
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="BLACK">
                  <activity
                      android:name="com.devkurdi.black.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # دروستکردنی فایلێن سەرەکی یێن Gradle
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "rootProject.name = 'black'" > settings.gradle
          
          echo '
          plugins {
              id "com.android.application" version "8.1.1" apply false
              id "org.jetbrains.kotlin.android" version "1.8.10" apply false
          }
          ' > build.gradle

          echo '
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
          }
          android {
              namespace "com.devkurdi.black"
              compileSdk 33
              defaultConfig {
                  applicationId "com.devkurdi.black"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation "androidx.core:core-ktx:1.9.0"
              implementation "androidx.activity:activity-compose:1.7.0"
              implementation platform("androidx.compose:compose-bom:2023.03.00")
              implementation "androidx.compose.ui:ui"
              implementation "androidx.compose.material3:material3"
          }
          ' > app/build.gradle

      - name: Verify Setup
        run: echo "پرۆسەیا ئامادەکردنی فایلان ب سەرکەفتیانە خلاس بوو!"
