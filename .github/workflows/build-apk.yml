name: Build Android Kotlin APK with Icon
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Project Structure and App Icon
        run: |
          mkdir -p app/src/main/java/com/devkurdi/black
          mkdir -p app/src/main/res/drawable
          
          cp MainActivity.kt app/src/main/java/com/devkurdi/black/
          
          if [ -f "ic_launcher.png" ]; then
            cp ic_launcher.png app/src/main/res/drawable/
          fi
          
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="BLACK"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name="com.devkurdi.black.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          echo '
          plugins {
              id "com.android.application" version "8.1.1" apply false
              id "org.jetbrains.kotlin.android" version "1.8.10" apply false
          }
          ' > build.gradle
      - name: Build Android APK
        run: echo "پرۆسەیا فەرمی یا دروستکردنی فایلی APK دەستپێکر..."
