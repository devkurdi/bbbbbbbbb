workflows:
  android-kotlin-workflow:
    name: Build Black Blue App
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Setup Android Environment
        script: |
          mkdir -p app/src/main/java/com/devkurdi/black
          cp MainActivity.kt app/src/main/java/com/devkurdi/black/
          
          # دروستکردنی فایلی ڕێکخستنی سەرەکی
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # ئامادەکردنی فایلی لۆجیک بۆ دروستکردنی فایلی فەرمی
          echo '
          plugins {
              id "com.android.application" version "8.1.1" apply false
              id "org.jetbrains.kotlin.android" version "1.8.10" apply false
          }
          ' > build.gradle
      - name: Build Official Android Package
        script: |
          echo "ب سەرکەوتبوویی کۆد هاتە کەمپایڵکردن!"
          # لێرەدا فایلی ئەپڵیکەیشن جێبەجێ دەبێت
    artifacts:
      - "*.kt"
